services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: egapp_backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUNAT_API_BASE_URL=${SUNAT_API_BASE_URL}
      - SUNAT_TOKEN_URL=${SUNAT_TOKEN_URL}
      - SUNAT_GEM_URL=${SUNAT_GEM_URL}
      - SUNAT_PORTAL_URL=${SUNAT_PORTAL_URL}
      - PLAYWRIGHT_HEADLESS=true
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: egapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
